name: Alerta Urgente

on:
  schedule:
    - cron: "0 */2 * * *" # a cada 2 horas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  urgente:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsx noticias.ts urgente
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: "false"

      - name: Commit urgent-history.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add urgent-history.json
          git diff --staged --quiet || git commit -m "chore: atualiza urgent-history.json"
          git push
